<div class="app-shell">
  <header class="header-row">
    <button class="icon-btn" (click)="goBack()" aria-label="Back">
      <svg class="icon" viewBox="0 0 24 24"><use href="#i-arrow-left"/></svg>
    </button>

    <h2 class="header-title">{{ pageTitle }}</h2>

    <nav class="actions">
      <a class="icon-btn" routerLink="/dashboard" routerLinkActive="active" aria-label="Dashboard">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-grid"/></svg>
      </a>
      <a class="icon-btn" routerLink="/students/list" routerLinkActive="active" aria-label="Student List">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-users"/></svg>
      </a>
      <a class="icon-btn" routerLink="/students/register" routerLinkActive="active" aria-label="Register Student">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-user-plus"/></svg>
      </a>
      <a class="icon-btn" routerLink="/students/attendance" routerLinkActive="active" aria-label="Mark Attendance">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-check-square"/></svg>
      </a>
      <a class="icon-btn" routerLink="/holidaylist" routerLinkActive="active" aria-label="Holidays">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-calendar"/></svg>
      </a>
      <button class="icon-btn" (click)="logout()" aria-label="Logout">
        <svg class="icon" viewBox="0 0 24 24"><use href="#i-log-out"/></svg>
      </button>
    </nav>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
