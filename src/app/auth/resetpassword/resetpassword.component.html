<div class="auth-page">
  <div class="ring-deco r1"></div>
  <div class="ring-deco r2"></div>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon"><svg class="icon" viewBox="0 0 24 24"><use href="#i-check-square"/></svg></div>
      <div class="brand-name">EduTrack</div>
    </div>

    <h2 class="title">Reset Password</h2>
    <p class="subtitle">Choose a new password for your account</p>

    <form [formGroup]="fgForm" (ngSubmit)="onSubmit()">
      <!-- New password -->
      <div class="field">
        <label>New Password</label>
        <div class="input-group">
          <svg class="icon input-icon" viewBox="0 0 24 24"><use href="#i-lock"/></svg>
          <input
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Enter new password"
            class="input-field input-field--with-toggle"
            [class.invalid]="fgForm.get('password')?.touched && fgForm.get('password')?.invalid"
          />
          <button type="button" class="toggle-visibility" (click)="hidePassword = !hidePassword" aria-label="Toggle password visibility">
            <svg class="icon" viewBox="0 0 24 24"><use [attr.href]="hidePassword ? '#i-eye' : '#i-eye-off'"/></svg>
          </button>
        </div>
        <div class="error" *ngIf="fgForm.get('password')?.touched && fgForm.get('password')?.invalid">
          Password is required
        </div>
      </div>

      <!-- Confirm password -->
      <div class="field">
        <label>Confirm Password</label>
        <div class="input-group">
          <svg class="icon input-icon" viewBox="0 0 24 24"><use href="#i-lock"/></svg>
          <input
            [type]="hideConfirmPassword ? 'password' : 'text'"
            formControlName="confirmPassword"
            placeholder="Re-enter new password"
            class="input-field input-field--with-toggle"
            [class.invalid]="fgForm.get('confirmPassword')?.touched && fgForm.get('confirmPassword')?.invalid"
          />
          <button type="button" class="toggle-visibility" (click)="hideConfirmPassword = !hideConfirmPassword" aria-label="Toggle confirm password visibility">
            <svg class="icon" viewBox="0 0 24 24"><use [attr.href]="hideConfirmPassword ? '#i-eye' : '#i-eye-off'"/></svg>
          </button>
        </div>
        <div class="error" *ngIf="fgForm.get('confirmPassword')?.touched && fgForm.get('confirmPassword')?.invalid">
          Confirm Password is required
        </div>
        <div class="error" *ngIf="fgForm.errors?.['passwordMismatch'] && fgForm.get('confirmPassword')?.touched">
          Passwords do not match
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn">Reset Password</button>
    </form>

    <!-- Footer -->
    <p class="footer-text">
      already have an account? <a href="#">Log in</a>
    </p>
  </div>
</div>
