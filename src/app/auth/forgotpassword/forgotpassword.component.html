<div class="auth-page">
  <div class="ring-deco r1"></div>
  <div class="ring-deco r2"></div>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon"><svg class="icon" viewBox="0 0 24 24"><use href="#i-check-square"/></svg></div>
      <div class="brand-name">EduTrack</div>
    </div>

    <h2 class="title">Forgot Password?</h2>
    <p class="subtitle">{{ isVisible ? 'Enter the OTP sent to your email' : 'Enter your email to receive an OTP' }}</p>

    <form [formGroup]="fgForm" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div class="field">
        <label>Email / Username</label>
        <div class="input-group">
          <svg class="icon input-icon" viewBox="0 0 24 24"><use href="#i-mail"/></svg>
          <input
            type="text"
            formControlName="toEmail"
            placeholder="Enter your email"
            class="input-field"
            [class.invalid]="fgForm.get('toEmail')?.touched && fgForm.get('toEmail')?.invalid"
          />
        </div>
        <div class="error" *ngIf="fgForm.get('toEmail')?.touched && fgForm.get('toEmail')?.invalid">
          Email is required
        </div>
      </div>

      <!-- OTP -->
      <div class="field" *ngIf="isVisible">
        <label>OTP</label>
        <div class="input-group">
          <svg class="icon input-icon" viewBox="0 0 24 24"><use href="#i-key"/></svg>
          <input
            type="text"
            formControlName="otp"
            placeholder="Enter the OTP"
            class="input-field"
          />
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn">{{ isVisible ? 'Verify OTP' : 'Send OTP' }}</button>
    </form>

    <!-- Footer -->
    <p class="footer-text">
      already have an account? <a href="#">Log in</a>
    </p>
  </div>
</div>
