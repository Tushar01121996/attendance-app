<div class="student-list-container">
  <!-- Header -->
  <div class="header-row">
    <button class="icon-btn" (click)="goBack()" aria-label="Back">
      <svg class="icon"><use href="#i-arrow-left"/></svg>
    </button>
    <h2 class="header-title">Mark Attendance</h2>
    <div class="actions">
      <button class="icon-btn" (click)="addNewStudent()" aria-label="Add Student">
        <svg class="icon"><use href="#i-user-plus"/></svg>
      </button>
      <button class="icon-btn" (click)="gotoDashboard()" aria-label="Go To Dashboard">
        <svg class="icon"><use href="#i-grid"/></svg>
      </button>
      <button class="icon-btn" (click)="submitAttendance()" aria-label="Submit Attendance">
        <svg class="icon"><use href="#i-save"/></svg>
      </button>
      <button class="icon-btn" (click)="logout()" aria-label="Logout">
        <svg class="icon"><use href="#i-log-out"/></svg>
      </button>
    </div>
  </div>

  <!-- Filters Row -->
  <div class="filters-row">
    <!-- Date Picker -->
    <div class="date-pill">
      <span class="lbl">Select Date</span>
      <input
        type="date"
        class="date-input"
        [value]="attendanceDate | date:'yyyy-MM-dd'"
        [attr.max]="maxDate | date:'yyyy-MM-dd'"
        (change)="onDateChange($event)"
      />
    </div>

    <!-- Search -->
    <div class="search-bar flex-grow">
      <svg class="icon"><use href="#i-search"/></svg>
      <input type="text" placeholder="Enter name, email..." (keyup)="applyFilter($event)" />
    </div>
  </div>

  <!-- Quick status counts -->
  <div class="quick-stats" *ngIf="!isHoliday">
    <div class="qs qs-present">
      <div class="qn">{{ getPresentCount() }}</div>
      <div class="ql">PRESENT</div>
    </div>
    <div class="qs qs-absent">
      <div class="qn">{{ getAbsentCount() }}</div>
      <div class="ql">ABSENT</div>
    </div>
  </div>

  <!-- Bulk Toggle -->
  <div class="bulk-toggle" *ngIf="!isHoliday">
    <button class="bulk-btn bulk-btn--present" (click)="setAllStatus(true)">
      <svg class="icon"><use href="#i-check-circle"/></svg> Mark All Present
    </button>
    <button class="bulk-btn bulk-btn--absent" (click)="setAllStatus(false)">
      <svg class="icon"><use href="#i-x-circle"/></svg> Mark All Absent
    </button>
  </div>

  <div *ngIf="isHoliday" class="holiday-wrapper">
    <div class="holiday-card">
      <div class="holiday-icon-circle">
        <svg class="icon holiday-icon"><use href="#i-event"/></svg>
      </div>
      <div class="holiday-message">
        {{message}}
      </div>
    </div>
  </div>

  <div *ngIf="!isHoliday">
    <!-- Student Cards -->
    <div class="student-card" *ngFor="let student of dataSource.filteredData">
      <div class="student-item">
        <!-- Avatar -->
        <span class="avatar-ring" [ngClass]="student.attendanceStatus ? 'present' : 'absent'">
          <div class="avatar">
            <img *ngIf="student.photo" [src]="environment.domainUrl + student.photo" alt="Photo" />
            <span *ngIf="!student.photo">{{ student.firstName?.[0] | uppercase }}</span>
          </div>
        </span>

        <!-- Info -->
        <div class="student-info">
          <div class="name">{{ student.firstName }} {{ student.lastName }}</div>
          <div class="details">Roll No : {{ student.rollNo }}</div>
        </div>

        <!-- Attendance Toggle -->
        <div class="segmented">
          <button
            type="button"
            [class.sel-p]="student.attendanceStatus"
            (click)="student.attendanceStatus = true"
          >P</button>
          <button
            type="button"
            [class.sel-a]="!student.attendanceStatus"
            (click)="student.attendanceStatus = false"
          >A</button>
        </div>
      </div>
    </div>
  </div>
</div>
